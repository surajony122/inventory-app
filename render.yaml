services:
  - type: web
    name: unnicharya-app
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "3000"
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        value: https://unnicharya-app.onrender.com
      - key: SCOPES
        value: write_products,read_orders,write_orders,read_customers,read_inventory,write_inventory,write_metaobject_definitions,write_metaobjects
      - key: DATABASE_URL
        fromDatabase:
          name: unnicharya-db
          property: connectionString

  - type: cron
    name: unnicharya-sync-orders
    plan: free
    schedule: "0 */5 * * *"
    startCommand: >-
      curl -sf -X POST https://unnicharya-app.onrender.com/api/cron/sync
      -H "x-cron-secret: $CRON_SECRET"
      -H "Content-Length: 0"
      && echo "sync ok"
    envVars:
      - key: CRON_SECRET
        sync: false

databases:
  - name: unnicharya-db
    plan: free
